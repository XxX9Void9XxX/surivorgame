<!DOCTYPE html>
<html>
<head>
    <title>Survivor Game IO</title>
    <style>
        body { margin: 0; overflow: hidden; background: #333; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        #team-ui { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 5px; pointer-events: auto; }
        #start-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; }
        canvas { display: block; }
        button { cursor: pointer; pointer-events: auto; }
    </style>
</head>
<body>

<div id="start-screen">
    <h1>SURVIVOR IO</h1>
    <input type="text" id="nameInput" placeholder="Name">
    <button onclick="join()">START</button>
</div>

<div id="ui">
    <div id="stats">XP: 0 | Blocks: 0 | Towers: 0</div>
</div>

<div id="team-ui">
    <strong>Team Invites</strong>
    <div id="invites"></div>
    <hr>
    <strong>Nearby Players</strong>
    <div id="nearby"></div>
</div>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let players = {}, enemies = [], resources = [], projectiles = [], blocks = [], towers = [];
    let obstacles = [], rivers = [];
    let myId = null;
    let camera = { x: 0, y: 0 };
    let keys = {};

    function join() {
        const name = document.getElementById('nameInput').value || "Player";
        socket.emit('joinGame', { name, color: `hsl(${Math.random()*360}, 70%, 50%)` });
        document.getElementById('start-screen').style.display = 'none';
        myId = socket.id;
    }

    window.onkeydown = e => keys[e.key.toLowerCase()] = true;
    window.onkeyup = e => keys[e.key.toLowerCase()] = false;
    window.onclick = e => {
        const worldX = Math.floor((e.clientX + camera.x) / 40) * 40;
        const worldY = Math.floor((e.clientY + camera.y) / 40) * 40;
        socket.emit('place', { type: keys['t'] ? 'tower' : 'block', x: worldX, y: worldY });
    };

    socket.on('initWorld', d => { obstacles = d.obstacles; rivers = d.rivers; });
    socket.on('serverUpdate', d => {
        players = d.players; enemies = d.enemies; resources = d.resources;
        projectiles = d.projectiles; blocks = d.placedBlocks; towers = d.placedTowers;
        updateUI();
    });

    function updateUI() {
        const me = players[socket.id];
        if (!me) return;
        document.getElementById('stats').innerText = `Level ${me.level} | XP: ${me.xp} | Blocks: ${me.blocks} | Towers: ${me.towers}`;
        
        // Update Team Lists
        let inviteHTML = "";
        me.teamRequests.forEach(id => {
            inviteHTML += `<div>${players[id]?.name || "Unknown"} <button onclick="socket.emit('acceptTeamReq', '${id}')">Accept</button></div>`;
        });
        document.getElementById('invites').innerHTML = inviteHTML;

        let nearbyHTML = "";
        Object.values(players).forEach(p => {
            if (p.id !== socket.id && !me.team.includes(p.id)) {
                nearbyHTML += `<div>${p.name} <button onclick="socket.emit('sendTeamReq', '${p.id}')">Invite</button></div>`;
            }
        });
        document.getElementById('nearby').innerHTML = nearbyHTML;
    }

    function loop() {
        const me = players[socket.id];
        if (me) {
            let speed = 4;
            // Check River Slowdown
            rivers.forEach(r => {
                if (me.x > r.x && me.x < r.x + r.w && me.y > r.y && me.y < r.y + r.h) speed = 1.5;
            });

            if (keys['w']) me.y -= speed;
            if (keys['s']) me.y += speed;
            if (keys['a']) me.x -= speed;
            if (keys['d']) me.x += speed;
            socket.emit('playerMoved', { x: me.x, y: me.y });
            camera.x = me.x - canvas.width/2;
            camera.y = me.y - canvas.height/2;
        }

        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        // Draw Map
        ctx.fillStyle = '#4455aa'; rivers.forEach(r => ctx.fillRect(r.x, r.y, r.w, r.h));
        ctx.fillStyle = '#555'; obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));
        
        // Draw Assets
        resources.forEach(r => {
            ctx.fillStyle = r.type === 'tree' ? '#2ecc71' : '#95a5a6';
            ctx.beginPath(); ctx.arc(r.x, r.y, r.radius, 0, Math.PI*2); ctx.fill();
        });

        blocks.forEach(b => { ctx.fillStyle = players[b.ownerId]?.color || '#fff'; ctx.fillRect(b.x, b.y, 40, 40); });
        towers.forEach(t => { ctx.fillStyle = '#222'; ctx.fillRect(t.x, t.y, 40, 40); });
        projectiles.forEach(p => { ctx.fillStyle = 'orange'; ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill(); });

        // Draw Players
        Object.values(players).forEach(p => {
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, 20, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'white'; ctx.fillText(p.name, p.x-10, p.y-25);
        });

        ctx.restore();

        // Minimap
        if (me) {
            ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(20, canvas.height - 170, 150, 150);
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(20 + (me.x/5000)*150, (canvas.height-170) + (me.y/5000)*150, 3, 0, Math.PI*2); ctx.fill();
            // Teammates on minimap
            me.team.forEach(tid => {
                const mate = players[tid];
                if (mate) {
                    ctx.fillStyle = 'cyan'; ctx.beginPath(); ctx.arc(20 + (mate.x/5000)*150, (canvas.height-170) + (mate.y/5000)*150, 2, 0, Math.PI*2); ctx.fill();
                }
            });
        }

        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
